    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zap-tracker.netlify.app/" />
    <meta property="og:title" content="ZapTracker - Dashboard - Nostr Lightning Analytics" />
    <meta property="og:description" content="Provides you complete visibility and management of your Zap ecosystem. Monitor analytics, manage wallets, engage with supporters, and share content - all from one powerful interface" />
    <meta property="og:image" content="https://zap-tracker.netlify.app/dashboard.png" />
    
    <!-- X (Twitter) -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://zap-tracker.netlify.app/" />
    <meta property="twitter:title" content="ZapTracker - Dashboard - Nostr Lightning Analytics" />
    <meta property="twitter:description" content="Provides you complete visibility and management of your Zap ecosystem. Monitor analytics, manage wallets, engage with supporters, and share content - all from one powerful interface" />

<!--    <link rel="icon" type="image/svg+xml" href="/nwc-logo.svg" />-->
    <link rel="icon" type="image/png" href="/new_logo3.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Nostr Login Modal -->
    <script
      src="https://unpkg.com/nostr-login@latest/dist/unpkg.js"
      data-dark-mode="true"
      data-theme="default"
      data-perms="sign_event:*,nip04_encrypt,nip04_decrypt"
      data-title="Welcome to ZapTracker!"
      data-description="Connect your Nostr identity to get started"
      data-no-banner="false"
      data-start-screen="welcome"
      data-methods="connect,extension,local,readOnly"
      data-bunkers="nsec.app,amber"
      onload="console.log('✅ Nostr-login script loaded successfully')"
      onerror="console.error('❌ Failed to load nostr-login from CDN')"
    ></script>

    <!-- Nostr-login initialization check -->
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        console.log('🔍 Checking nostr-login initialization...')
        console.log('window.nostr available:', !!window.nostr)
        console.log('Nostr-login script element:', !!document.querySelector('script[src*="nostr-login"]'))

        // Listen for all nostr-login events for debugging
        document.addEventListener('nlAuth', (e) => {
          console.log('🎯 nlAuth event detected:', e.detail)
        })

        // Check if nostr-login initialized after a delay
        setTimeout(() => {
          const nostrLoginLoaded = document.querySelector('script[src*="nostr-login"]')
          if (nostrLoginLoaded) {
            console.log('✅ Nostr-login appears to be loaded')
          } else {
            console.error('❌ Nostr-login script not found after page load')
          }
        }, 1000)
      })
    </script>

  <script defer src="https://cloud.umami.is/script.js" data-website-id="bca4671b-8a36-4c4e-ba4f-fd5434054bdc"></script>
  </head>
  <body>
    <div id="app"></div>
    <!-- Modal root for teleported modals -->
    <div id="modal-root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
